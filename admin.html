<!DOCTYPE html>
<html>
<head>
<title>Cafe Admin</title>

<style>
body{
font-family:Poppins;
background:#121212;
color:white;
}

.order{
background:#1f1f1f;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px black;
}
</style>

</head>

<body>

<h1>🔥 Live Cafe Orders</h1>

<div id="orders"></div>

<script>

setInterval(load,1000);

function load(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];

let html="";

orders.forEach(o=>{
html+=`
<div class="order">
<h2>${o.table}</h2>
<p>${o.items.join(", ")}</p>
<small>${o.time}</small>
</div>`;
});

document.getElementById("orders").innerHTML=html;
}

</script>

</body>
</html>
