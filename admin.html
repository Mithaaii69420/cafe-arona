<!DOCTYPE html>
<html>
<head>
<title>Luxury Cafe Dashboard</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Poppins;
}

.order{
background:#1a1a1a;
margin:25px;
padding:25px;
border-radius:15px;
border-left:6px solid gold;
}
</style>

</head>

<body>

<h1>☕ Live Luxury Orders</h1>

<div id="orders"></div>

<script>

setInterval(load,1000);

function load(){

let orders=JSON.parse(localStorage.getItem("orders"))||[];

let html="";

orders.forEach(o=>{
html+=`
<div class="order">
<h2>${o.table}</h2>
<p>${o.items.join(", ")}</p>
<small>${o.time}</small>
</div>`;
});

document.getElementById("orders").innerHTML=html;
}

</script>

</body>
</html>
