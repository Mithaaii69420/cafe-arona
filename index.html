<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cafe Aroma</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.6);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-family:"Playfair Display";
font-size:28px;
color:#d4af37;
letter-spacing:2px;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:80px;
font-family:"Playfair Display";
letter-spacing:4px;
}

.hero p{
margin-top:15px;
font-size:20px;
opacity:.8;
}

/* TABLE SELECT */

.table-select{
text-align:center;
padding:60px 20px;
}

select{
padding:12px;
font-size:18px;
border-radius:8px;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
padding:40px 60px;
}

/* LUXURY CARD */

.card{
background:rgba(255,255,255,.05);
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(20px);
transition:.5s;
box-shadow:0 0 30px rgba(0,0,0,.8);
}

.card:hover{
transform:translateY(-15px) scale(1.03);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card h3{
padding:18px;
font-size:24px;
}

button{
margin:15px;
padding:12px 20px;
border:none;
background:#d4af37;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#f1d27a;
}

/* CART */

.cart{
text-align:center;
padding:40px;
}

footer{
text-align:center;
padding:40px;
opacity:.6;
}

</style>
</head>

<body>

<nav>
<div class="logo">Cafe Aroma</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Cafe Aroma</h1>
<p>Luxury Coffee Experience</p>
</section>

<!-- TABLE -->
<div class="table-select">
<h2>Select Your Table</h2>
<select id="table">
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>
<option>Table 6</option>
<option>Table 7</option>
<option>Table 8</option>
</select>
</div>

<!-- MENU -->
<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-429c9c5f2b16">
<h3>Maggie</h3>
<button onclick="add('Maggie')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523906630133-f6934a1ab2b9">
<h3>Tea</h3>
<button onclick="add('Tea')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
<h3>Coffee</h3>
<button onclick="add('Coffee')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb">
<h3>Pasta</h3>
<button onclick="add('Pasta')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1564419320403-38a91bde6f2c">
<h3>Water Bottle</h3>
<button onclick="add('Water Bottle')">Order</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h2>Your Order</h2>
<ul id="cart"></ul>
<button onclick="placeOrder()">Place Order</button>
</div>

<footer>
© 2026 Cafe Aroma — Crafted With Passion
</footer>

<script>

let cart=[];

function add(item){
cart.push(item);
document.getElementById("cart").innerHTML+=`<li>${item}</li>`;
}

function placeOrder(){

let table=document.getElementById("table").value;

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
table:table,
items:cart,
time:new Date().toLocaleTimeString()
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("☕ Order Sent To Kitchen");

cart=[];
document.getElementById("cart").innerHTML="";
}

</script>

</body>
</html>
