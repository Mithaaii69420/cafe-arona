<!DOCTYPE html>
<html>
<head>
<title>Cafe Aroma</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f0f0f;
color:white;
text-align:center;
}

/* HERO */
header{
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover;
padding:120px 20px;
font-size:40px;
font-weight:700;
}

/* TABLE SELECT */
select{
padding:10px;
font-size:18px;
margin:20px;
border-radius:6px;
}

/* MENU GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}

/* CARD */
.card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
transition:.3s;
box-shadow:0 0 15px rgba(0,0,0,.6);
}

.card:hover{
transform:translateY(-10px);
}

/* SAME IMAGE SIZE */
.card img{
width:100%;
height:180px;
object-fit:cover;
}

/* BUTTON */
button{
background:#ff6b00;
border:none;
padding:12px 18px;
margin:15px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff8533;
}

/* ORDER LIST */
#cart{
list-style:none;
font-size:18px;
}

</style>
</head>

<body>

<header>
☕ Cafe Aroma  
<br>Order From Your Table
</header>

<h2>Select Table</h2>

<select id="table">
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>
<option>Table 6</option>
<option>Table 7</option>
<option>Table 8</option>
</select>

<div class="menu">

<!-- MAGGIE -->
<div class="card">
<img src="https://images.unsplash.com/photo-1604908554162-7c8c0e7c1b52">
<h3>Maggie ₹60</h3>
<button onclick="add('Maggie')">Add</button>
</div>

<!-- TEA -->
<div class="card">
<img src="https://images.unsplash.com/photo-1523906630133-f6934a1ab2b9">
<h3>Tea ₹20</h3>
<button onclick="add('Tea')">Add</button>
</div>

<!-- COFFEE -->
<div class="card">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
<h3>Coffee ₹40</h3>
<button onclick="add('Coffee')">Add</button>
</div>

<!-- PASTA -->
<div class="card">
<img src="https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb">
<h3>Pasta ₹120</h3>
<button onclick="add('Pasta')">Add</button>
</div>

<!-- WATER -->
<div class="card">
<img src="https://images.unsplash.com/photo-1564419320403-38a91bde6f2c">
<h3>Water Bottle ₹20</h3>
<button onclick="add('Water Bottle')">Add</button>
</div>

</div>

<h2>Your Order</h2>
<ul id="cart"></ul>

<button onclick="order()">Place Order</button>

<script>

let cart=[];

function add(item){
cart.push(item);
show();
}

function show(){
let ul=document.getElementById("cart");
ul.innerHTML="";
cart.forEach(i=>{
ul.innerHTML+=`<li>${i}</li>`;
});
}

function order(){
let table=document.getElementById("table").value;

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
table:table,
items:cart,
time:new Date().toLocaleTimeString()
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("✅ Order Sent To Kitchen!");

cart=[];
show();
}

</script>

</body>
</html>
