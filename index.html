<!DOCTYPE html>
<html>
<head>
<title>Cafe Aroma</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* HERO */
.hero{
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover;
padding:120px;
font-size:40px;
font-weight:bold;
}

/* MENU GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

/* CARD */
.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px black;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

button{
background:#ff6600;
border:none;
padding:12px;
color:white;
margin:15px;
cursor:pointer;
border-radius:6px;
}

select{
padding:10px;
font-size:18px;
margin:20px;
}

</style>
</head>

<body>

<div class="hero">
☕ Cafe Aroma
<br>Fresh Taste Everyday
</div>

<h2>Select Table</h2>

<select id="table">
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>
<option>Table 6</option>
<option>Table 7</option>
<option>Table 8</option>
</select>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-429c9c5f2b16">
<h3>Maggie</h3>
<button onclick="add('Maggie')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523906630133-f6934a1ab2b9">
<h3>Tea</h3>
<button onclick="add('Tea')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
<h3>Coffee</h3>
<button onclick="add('Coffee')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb">
<h3>Pasta</h3>
<button onclick="add('Pasta')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1564419320403-38a91bde6f2c">
<h3>Water Bottle</h3>
<button onclick="add('Water Bottle')">Order</button>
</div>

</div>

<h2>Your Order</h2>
<ul id="cart"></ul>

<button onclick="placeOrder()">Place Order</button>

<script>

let cart=[];

function add(item){
cart.push(item);
document.getElementById("cart").innerHTML+=`<li>${item}</li>`;
}

function placeOrder(){

let table=document.getElementById("table").value;

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
table:table,
items:cart
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("Order Sent Successfully");

cart=[];
document.getElementById("cart").innerHTML="";
}

</script>

</body>
</html>
